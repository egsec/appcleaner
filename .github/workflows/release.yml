name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb and publish release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      # generate_context! derleme anında dist/ içeriğini gömdüğü için
      # cargo test'ten önce frontend build gerekir
      - name: Frontend build
        run: npm run build

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AppCleaner ${{ github.ref_name }}"
          releaseBody: |
            Linux paketleri aşağıdadır:

            - **Debian/Ubuntu:** `sudo apt install ./AppCleaner_*_amd64.deb`
            - **Fedora/openSUSE:** `sudo dnf install ./AppCleaner-*.x86_64.rpm`
            - **Her dağıtım:** AppImage dosyasını indirip `chmod +x` ile çalıştırılabilir yapın
          releaseDraft: false
          prerelease: false
          args: --bundles deb,rpm,appimage
